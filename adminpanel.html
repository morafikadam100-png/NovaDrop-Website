<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 20px;
      background: red;
      margin: 0;
    }

    .container {
      margin-top: 30px;
    }

    .card {
      background: #222;
      margin: 15px;
      padding: 20px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 10px;
      background: red;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<h1>👑 ADMIN PANEL</h1>

<div class="container">

  <div class="card">
    <h3>إدارة الموقع</h3>
    <button onclick="addContent()">➕ إضافة محتوى</button>
    <button onclick="deleteContent()">🗑️ حذف الكل</button>
    <button onclick="showContent()">👀 عرض المحتوى</button>
  </div>

  <div class="card">
    <h3>المستخدمين</h3>
    <button onclick="showUsers()">👀 عرض المستخدمين</button>
    <button onclick="deleteUsers()">🗑 حذف المستخدمين</button>
  </div>

  <div class="card">
    <h3>تنقل</h3>
    <button onclick="goHome()">🏠 الصفحة الرئيسية</button>
  </div>

  <div class="card">
    <h3>تحكم عام</h3>
    <button onclick="logout()">🚪 Logout</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB6eRzkkPGGe6Km_e8OC6SoNI9vYE1KeuY",
  authDomain: "plassher-b7ad4.firebaseapp.com",
  projectId: "plassher-b7ad4",
  storageBucket: "plassher-b7ad4.appspot.com",
  messagingSenderId: "217915657263",
  appId: "1:217915657263:web:7115fb78191e7d0b2e4ada"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


// 🔐 حماية الصفحة
firebase.auth().onAuthStateChanged((user) => {
  if(user){
    if(
      user.email === "adamzighem6@gmail.com" ||
      user.email === "dchrifabdellah@gmail.com"
    ){
      console.log("Admin OK");
    } else {
      alert("ماشي Admin ❌");
      window.location.href = "index.html";
    }
  } else {
    window.location.href = "index.html";
  }
});


// ➕ إضافة محتوى
function addContent(){
  let text = prompt("دخل المحتوى");

  if(!text){
    alert("فارغ ❌");
    return;
  }

  db.collection("posts").add({
    content: text,
    created: new Date()
  })
  .then(()=>{
    alert("تمت الإضافة ✅");
  });
}


// 👀 عرض المحتوى
function showContent(){
  db.collection("posts").get().then((snapshot)=>{
    let result = "";

    snapshot.forEach(doc=>{
      result += "• " + doc.data().content + "\n";
    });

    alert(result || "ماكاين حتى محتوى");
  });
}


// 🗑 حذف الكل
function deleteContent(){
  db.collection("posts").get().then((snapshot)=>{
    snapshot.forEach(doc=>{
      doc.ref.delete();
    });

    alert("تم الحذف كامل ✅");
  });
}


// 👥 عرض المستخدمين
function showUsers(){
  db.collection("users").get().then((snapshot)=>{
    let result = "";

    snapshot.forEach(doc=>{
      let user = doc.data();
      result += "👤 " + user.name + " " + user.lastname + "\n📧 " + user.email + "\n\n";
    });

    alert(result || "ماكاين حتى مستخدم");
  });
}


// 🗑 حذف المستخدمين
function deleteUsers(){
  db.collection("users").get().then((snapshot)=>{
    snapshot.forEach(doc=>{
      doc.ref.delete();
    });

    alert("تم حذف المستخدمين ❌");
  });
}


// 🏠 الصفحة الرئيسية
function goHome(){
  window.location.href = "home.html";
}


// 🚪 Logout
function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
